AWSTemplateFormatVersion: "2010-09-09"
Description: Lab 01 - Bedrock invocation observability for AI fault-tolerance evidence.

Parameters:
  FunctionName:
    Type: String
    Default: ft-lab01-bedrock-observability
  ModelId:
    Type: String
    Default: anthropic.claude-3-haiku-20240307-v1:0
  PromptVersion:
    Type: String
    Default: support-assistant-v1
  CapabilityName:
    Type: String
    Default: customer-support-assistant

Resources:
  FunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${FunctionName}
      RetentionInDays: 14

  FunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockInvokeModel
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: "*"

  BedrockObservabilityFunction:
    Type: AWS::Lambda::Function
    DependsOn:
      - FunctionLogGroup
    Properties:
      FunctionName: !Ref FunctionName
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt FunctionRole.Arn
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          MODEL_ID: !Ref ModelId
          PROMPT_VERSION: !Ref PromptVersion
          CAPABILITY_NAME: !Ref CapabilityName
      Code:
        ZipFile: |
          import hashlib
          import json
          import logging
          import os
          import time

          import boto3

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          bedrock = boto3.client("bedrock-runtime")

          def _safe_int(value, default):
              try:
                  return int(value)
              except Exception:
                  return default

          def _response_text(payload):
              content = payload.get("content", [])
              parts = []
              for item in content:
                  if item.get("type") == "text":
                      parts.append(item.get("text", ""))
              return "\n".join(parts).strip()

          def handler(event, context):
              model_id = event.get("model_id") or os.environ["MODEL_ID"]
              prompt_version = event.get("prompt_version") or os.environ["PROMPT_VERSION"]
              capability = event.get("capability") or os.environ["CAPABILITY_NAME"]
              degradation_mode = event.get("degradation_mode", "none")
              max_tokens = _safe_int(event.get("max_tokens", 300), 300)
              prompt = event.get("prompt") or "Explain why AI workload recovery needs trust signals as well as service signals."

              prompt_hash = hashlib.sha256(prompt.encode("utf-8")).hexdigest()[:16]
              started = time.perf_counter()

              body = {
                  "anthropic_version": "bedrock-2023-05-31",
                  "max_tokens": max_tokens,
                  "temperature": 0,
                  "messages": [
                      {
                          "role": "user",
                          "content": [
                              {
                                  "type": "text",
                                  "text": prompt
                              }
                          ]
                      }
                  ]
              }

              log_record = {
                  "event_type": "ai_invocation_observability",
                  "capability": capability,
                  "model_id": model_id,
                  "prompt_version": prompt_version,
                  "degradation_mode": degradation_mode,
                  "prompt_hash": prompt_hash,
                  "aws_request_id": context.aws_request_id,
                  "function_name": context.function_name,
              }

              try:
                  response = bedrock.invoke_model(
                      modelId=model_id,
                      contentType="application/json",
                      accept="application/json",
                      body=json.dumps(body),
                  )

                  latency_ms = int((time.perf_counter() - started) * 1000)
                  response_payload = json.loads(response["body"].read())
                  metadata = response.get("ResponseMetadata", {})
                  usage = response_payload.get("usage", {})

                  log_record.update({
                      "status": "success",
                      "latency_ms": latency_ms,
                      "request_id": metadata.get("RequestId"),
                      "http_status_code": metadata.get("HTTPStatusCode"),
                      "input_tokens": usage.get("input_tokens"),
                      "output_tokens": usage.get("output_tokens"),
                  })
                  logger.info(json.dumps(log_record))

                  return {
                      "statusCode": 200,
                      "body": {
                          "answer": _response_text(response_payload),
                          "observability": log_record,
                      },
                  }
              except Exception as exc:
                  latency_ms = int((time.perf_counter() - started) * 1000)
                  log_record.update({
                      "status": "error",
                      "latency_ms": latency_ms,
                      "error_type": exc.__class__.__name__,
                      "error_message": str(exc)[:500],
                  })
                  logger.error(json.dumps(log_record))
                  return {
                      "statusCode": 500,
                      "body": {
                          "error": "bedrock_invocation_failed",
                          "observability": log_record,
                      },
                  }

Outputs:
  FunctionName:
    Description: Lambda function name
    Value: !Ref BedrockObservabilityFunction
  LogGroupName:
    Description: CloudWatch Logs log group
    Value: !Ref FunctionLogGroup
  ModelId:
    Description: Bedrock model configured for this lab
    Value: !Ref ModelId
